# /etc/nginx/sites-available/threadsave
# After editing, symlink to sites-enabled and reload:
#   ln -s /etc/nginx/sites-available/threadsave /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name threadsdownloads.com www.threadsdownloads.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name threadsdownloads.com www.threadsdownloads.com;

    ssl_certificate /etc/letsencrypt/live/threadsdownloads.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/threadsdownloads.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Hardening
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    # Body / timeouts
    client_max_body_size 1m;

    # Static assets — served by Nginx directly
    location /css/ {
        root /var/www/threadsave/public;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location /js/ {
        root /var/www/threadsave/public;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location = /favicon.svg {
        root /var/www/threadsave/public;
        expires 30d;
        access_log off;
    }
    location = /robots.txt {
        root /var/www/threadsave/public;
        access_log off;
    }
    location = /sitemap.xml {
        root /var/www/threadsave/public;
        access_log off;
    }

    # Everything else → Node
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Critical for streaming downloads (videos + ZIPs)
        proxy_buffering off;
        proxy_request_buffering off;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;
}
